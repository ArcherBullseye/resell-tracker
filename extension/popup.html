<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }
    .header {
      background: #16213e;
      padding: 12px 14px;
      border-bottom: 1px solid #2d2d4e;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-title { font-weight: 600; font-size: 14px; }
    .site-badge {
      background: #2a7a5a;
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: auto;
    }
    .site-badge.unsupported { background: #555; }
    .body { padding: 12px 14px; }
    .buffer-bar {
      background: #12122a;
      border: 1px solid #2d2d4e;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 11px;
      color: #a0a8c0;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .buffer-count { font-weight: 600; color: #e0e0e0; }
    .btn-clear { font-size: 10px; color: #888; background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; }
    .btn-clear:hover { color: #f08080; }
    .btn-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .scan-btn {
      flex: 1;
      padding: 9px 6px;
      background: #2a7a5a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .scan-btn:disabled { background: #333; color: #666; cursor: default; }
    .scan-btn:hover:not(:disabled) { background: #339966; }
    .auto-btn {
      flex: 1;
      padding: 9px 6px;
      background: #3a2d70;
      color: #e0e0e0;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .auto-btn:disabled { background: #222; color: #555; cursor: default; }
    .auto-btn:hover:not(:disabled) { background: #5040a0; }
    .auto-btn.scanning { background: #1e3a1e; color: #4caf80; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .download-btn {
      width: 100%;
      padding: 8px;
      background: #2d4070;
      color: #e0e0e0;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .download-btn:disabled { background: #1e2a3a; color: #555; cursor: default; }
    .download-btn:hover:not(:disabled) { background: #3a52a0; }
    .status {
      font-size: 12px;
      min-height: 36px;
      padding: 6px 8px;
      border-radius: 5px;
      background: #12122a;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }
    .status.ok   { color: #4caf80; }
    .status.err  { color: #f08080; }
    .status.info { color: #a0a8c0; }
    .hint { font-size: 10px; color: #666; margin-top: 4px; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="header">
    <span>&#129513;</span>
    <span class="header-title">Resell Tracker</span>
    <span class="site-badge unsupported" id="site-badge">Loading…</span>
  </div>
  <div class="body">
    <div class="buffer-bar">
      <span id="buffer-count" class="buffer-count">Buffer empty</span>
      <button class="btn-clear" id="clear-btn" style="display:none">Clear</button>
    </div>
    <div class="btn-row">
      <button class="scan-btn" id="scan-btn" disabled title="Scan only this page">&#9654; This Page</button>
      <button class="auto-btn" id="auto-btn" disabled title="Follow pagination and scan all pages automatically">&#9889; All Pages</button>
    </div>
    <button class="download-btn" id="download-btn" disabled>&#11015; Download File</button>
    <div class="status info" id="status">Detecting page…</div>
    <div class="hint">&#9889; All Pages follows pagination automatically across all pages. Download when done, then upload in Resell Tracker &rarr; Scanner.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
