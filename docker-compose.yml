version: "3.7"

services:
  app:
    build: .
    image: ghcr.io/ArcherBullseye/resell-tracker:latest
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - UPC_API_KEY=${UPC_API_KEY:-}
      - EBAY_APP_ID=${EBAY_APP_ID:-}
    volumes:
      - "${APP_DATA_DIR:-./data}:/app/data"
