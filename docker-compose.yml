version: "3.8"

services:
  resell-tracker:
    build: .
    network_mode: host
    volumes:
      - ${APP_DATA_DIR:-./data}:/app/data
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - EBAY_APP_ID=${EBAY_APP_ID:-}
      - UPC_API_KEY=${UPC_API_KEY:-}
    restart: unless-stopped
    labels:
      - "umbrel.app-id=resell-tracker"
